<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotchScript</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="island" class="island island--compact" aria-label="NotchScript Hello World">
      <section class="compact-view" aria-hidden="false">
        <div class="pulse" aria-hidden="true"></div>
        <div class="compact-copy">
          <span class="eyebrow">NotchScript</span>
          <strong>Hello World</strong>
        </div>
      </section>

      <section class="expanded-view" aria-hidden="true">
        <div class="expanded-header">
          <div class="status-dot" aria-hidden="true"></div>
          <div>
            <span class="eyebrow">FluidNotch</span>
            <h1>Hello World</h1>
          </div>
        </div>
        <p>最小灵动岛原型已运行。它可以展开、收起，并在常驻状态下保持鼠标穿透。</p>
        <div class="actions">
          <button id="collapseButton" type="button">收起</button>
          <button id="passThroughButton" type="button">穿透</button>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
