<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotchScript</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="island" class="island island--compact" aria-label="NotchScript Hello World">
      <div class="notch-shadow" aria-hidden="true"></div>
      <section class="compact-view" aria-hidden="false">
        <div class="live-dot" aria-hidden="true"></div>
        <div class="compact-copy">
          <strong>Hello World</strong>
        </div>
      </section>

      <section class="expanded-view" aria-hidden="true">
        <div class="expanded-header">
          <div class="live-orb" aria-hidden="true"></div>
          <div>
            <span class="eyebrow">NotchScript</span>
            <h1>Hello World</h1>
          </div>
        </div>
        <p>最小灵动岛原型已运行</p>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
